<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tempo di Incanto</title>
  <meta name="description" content="Tempo di Incanto crea video personalizzati magici, con personaggi 3D e momenti speciali dedicati a te." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: #0d0a12;
      color: #f5ede0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .stars {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(212,175,95,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(212,130,120,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 680px;
      padding: 3rem 2rem;
    }

    .logo-ring {
      width: 110px;
      height: 110px;
      margin: 0 auto 2rem;
      border-radius: 50%;
      background: linear-gradient(135deg, #d4af5f, #e8c88a, #c9956a);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(212,175,95,0.35), 0 0 80px rgba(212,175,95,0.12);
      font-size: 3rem;
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      background: linear-gradient(135deg, #d4af5f, #f5e6c8, #c9956a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1.05rem;
      color: #c9b89a;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      font-family: 'Helvetica Neue', sans-serif;
      font-weight: 300;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #d4af5f, transparent);
      margin: 0 auto 2.5rem;
    }

    .description {
      font-size: 1.2rem;
      line-height: 1.9;
      color: #e8ddd0;
      margin-bottom: 3rem;
    }

    .description em {
      color: #d4af5f;
      font-style: normal;
    }

    .social-links {
      display: flex;
      gap: 1.2rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 3rem;
    }

    .social-links a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.4rem;
      border: 1px solid rgba(212,175,95,0.3);
      border-radius: 50px;
      color: #d4af5f;
      text-decoration: none;
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
      background: rgba(212,175,95,0.04);
    }

    .social-links a:hover {
      background: rgba(212,175,95,0.12);
      border-color: rgba(212,175,95,0.6);
      box-shadow: 0 0 20px rgba(212,175,95,0.15);
    }

    .contact {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 0.85rem;
      color: #8a7a6a;
      letter-spacing: 0.05em;
    }

    .contact a {
      color: #b09060;
      text-decoration: none;
    }

    .contact a:hover {
      color: #d4af5f;
    }

    .petals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .petal {
      position: absolute;
      width: 8px;
      height: 12px;
      border-radius: 50% 0 50% 0;
      opacity: 0;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 0.6; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="stars"></div>

  <div class="petals" id="petals"></div>

  <div class="container">
    <div class="logo-ring">✨</div>

    <h1>Tempo di Incanto</h1>
    <p class="tagline">Magia su misura per te</p>

    <div class="divider"></div>

    <p class="description">
      Creiamo <em>video personalizzati magici</em>,<br />
      con personaggi 3D e momenti speciali<br />
      dedicati <em>a te</em>.
    </p>

    <div class="social-links">
      <a href="https://www.instagram.com/tempodiincanto/" target="_blank">📸 Instagram</a>
      <a href="https://www.facebook.com/tempodiincanto" target="_blank">📘 Facebook</a>
      <a href="https://www.youtube.com/@tempodiincanto" target="_blank">▶️ YouTube</a>
      <a href="https://www.tiktok.com/@guidox1" target="_blank">🎵 TikTok</a>
    </div>

    <p class="contact">
      Contatti: <a href="mailto:tempodiincanto@gmail.com">tempodiincanto@gmail.com</a>
    </p>
    <p class="contact" style="margin-top:1.5rem;">
      <a href="/privacy.html">Privacy Policy</a> &nbsp;·&nbsp; <a href="/terms.html">Terms of Service</a>
    </p>
  </div>

  <script>
    const petals = document.getElementById('petals');
    const colors = ['#f5c5b0','#e8b4a0','#f0d5c0','#d4af5f','#f5e0d0'];
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDuration = (8 + Math.random() * 12) + 's';
      p.style.animationDelay = (Math.random() * 15) + 's';
      p.style.width = (6 + Math.random() * 8) + 'px';
      p.style.height = (8 + Math.random() * 10) + 'px';
      petals.appendChild(p);
    }
  </script>

</body>
</html>
