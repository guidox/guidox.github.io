<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TikTok OAuth — Redirecting…</title>
  <style>
    body { font-family: sans-serif; background: #0d0f14; color: #e8eaf0;
           display: flex; align-items: center; justify-content: center;
           height: 100vh; margin: 0; flex-direction: column; gap: 16px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #252a38;
               border-top-color: #4f8ef7; border-radius: 50%;
               animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #6b7280; font-size: 14px; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Autorizzazione TikTok in corso…</p>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code  = params.get("code")  || "";
    const state = params.get("state") || "";
    const error = params.get("error") || "";
    if (error) {
      document.querySelector("p").textContent = "Errore: " + error;
    } else if (code) {
      window.location.href = "http://localhost:8765/callback/tiktok"
        + "?code=" + encodeURIComponent(code)
        + "&state=" + encodeURIComponent(state);
    } else {
      document.querySelector("p").textContent = "Parametri mancanti. Riprova dal wizard.";
    }
  </script>
</body>
</html>
